<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kards HQ Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            padding: 50px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
        }

        .download-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #ffed4a;
        }

        .close-btn {
            position: absolute;
            top: -50px;
            left: 0;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #c0392b;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            padding: 50px;
            font-size: 18px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 999;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #ffed4a;
            transform: scale(1.05);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toolbar-btn:hover {
            background: #ffed4a;
        }

        .toolbar-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .selected-count {
            color: #ffd700;
            font-size: 16px;
            margin-left: 10px;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .card.selected {
            box-shadow: 0 0 0 3px #ffd700;
        }

        .card-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 24px;
            height: 24px;
            accent-color: #ffd700;
            cursor: pointer;
            z-index: 10;
        }

        .selected-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .selected-modal.active {
            display: block;
        }

        .selected-modal-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .selected-modal-header {
            position: sticky;
            top: 0;
            background: #1a1a2e;
            padding: 20px;
            z-index: 10;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .selected-modal-title {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        .selected-modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .selected-modal-card {
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .selected-modal-card:hover {
            transform: scale(1.02);
        }

        .selected-modal-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .selected-modal-remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e74c3c;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected-modal-remove-btn:hover {
            background: #c0392b;
        }

        .empty-selected {
            text-align: center;
            color: #aaa;
            padding: 50px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">返回</a>
    <div class="container">
        <h1>Kards 总部卡牌</h1>
        <div class="toolbar">
            <button id="viewSelectedBtn" class="toolbar-btn" onclick="openSelectedModal()" disabled>预览选中</button>
            <button id="downloadSelectedBtn" class="toolbar-btn" onclick="downloadSelected()" disabled>下载选中</button>
            <span id="selectedCount" class="selected-count">已选择: 0</span>
        </div>
        <div id="loading" class="loading">加载中...</div>
        <div id="gallery" class="gallery"></div>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">关闭</button>
            <button class="download-btn" onclick="downloadImage()">下载</button>
            <img id="modalImg" src="" alt="放大图片">
        </div>
    </div>

    <div id="selectedModal" class="selected-modal">
        <div class="selected-modal-content">
            <div class="selected-modal-header">
                <span class="selected-modal-title">已选中的卡牌</span>
                <div>
                    <button class="close-btn" onclick="closeSelectedModal()">关闭</button>
                </div>
            </div>
            <div id="selectedGallery" class="selected-modal-gallery"></div>
        </div>
    </div>

    <script>
        let currentImageUrl = '';
        let currentNormalizedName = '';
        let allCards = [];
        let selectedCards = new Set();

        function extractNormalizedName(imageUrl) {
            const parts = imageUrl.split('/');
            const fileName = parts[parts.length - 1];
            return fileName.replace(/\.[^/.]+$/, '');
        }

        function getImageUrl(imageUrl) {
            return `https://images.weserv.nl/?url=ssl:www.kards.com${imageUrl}`;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            allCards.forEach((card, index) => {
                const imgUrl = getImageUrl(card.imageUrl);
                const normalizedName = extractNormalizedName(card.imageUrl);

                const cardDiv = document.createElement('div');
                cardDiv.className = `card${selectedCards.has(index) ? ' selected' : ''}`;
                cardDiv.dataset.index = index;
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'card-checkbox';
                checkbox.checked = selectedCards.has(index);
                checkbox.onclick = (e) => {
                    e.stopPropagation();
                    toggleCardSelection(index);
                };
                
                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = '卡牌';
                img.loading = 'lazy';
                img.onclick = (e) => {
                    e.stopPropagation();
                    openModal(imgUrl, normalizedName);
                };
                
                cardDiv.onclick = () => toggleCardSelection(index);
                
                cardDiv.appendChild(checkbox);
                cardDiv.appendChild(img);
                gallery.appendChild(cardDiv);
            });
        }

        function toggleCardSelection(index) {
            if (selectedCards.has(index)) {
                selectedCards.delete(index);
            } else {
                selectedCards.add(index);
            }
            updateSelectionUI();
            renderGallery();
        }

        function updateSelectionUI() {
            const count = selectedCards.size;
            document.getElementById('selectedCount').textContent = `已选择: ${count}`;
            document.getElementById('downloadSelectedBtn').disabled = count === 0;
            document.getElementById('viewSelectedBtn').disabled = count === 0;
        }

        function openSelectedModal() {
            renderSelectedGallery();
            document.getElementById('selectedModal').classList.add('active');
        }

        function closeSelectedModal() {
            document.getElementById('selectedModal').classList.remove('active');
        }

        function renderSelectedGallery() {
            const gallery = document.getElementById('selectedGallery');
            gallery.innerHTML = '';
            
            if (selectedCards.size === 0) {
                gallery.innerHTML = '<div class="empty-selected">暂无选中的卡牌</div>';
                return;
            }

            const sortedIndices = Array.from(selectedCards).sort((a, b) => a - b);
            
            sortedIndices.forEach(index => {
                const card = allCards[index];
                const imgUrl = getImageUrl(card.imageUrl);

                const cardDiv = document.createElement('div');
                cardDiv.className = 'selected-modal-card';
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'selected-modal-remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleCardSelection(index);
                    if (selectedCards.size === 0) {
                        closeSelectedModal();
                    } else {
                        renderSelectedGallery();
                    }
                };
                
                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = '卡牌';
                
                cardDiv.appendChild(removeBtn);
                cardDiv.appendChild(img);
                gallery.appendChild(cardDiv);
            });
        }

        async function loadCards() {
            try {
                const response = await fetch('hq_list.json');
                if (!response.ok) {
                    throw new Error('加载失败');
                }
                allCards = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderGallery();
            } catch (error) {
                document.getElementById('loading').textContent = '加载失败';
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            }
        }

        function openModal(imgUrl, normalizedName) {
            currentImageUrl = imgUrl;
            currentNormalizedName = normalizedName;
            document.getElementById('modalImg').src = imgUrl;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function downloadSingleImage(imgUrl, normalizedName) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob(function(blob) {
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${normalizedName}.avif`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                        resolve();
                    }, 'image/png');
                };
                img.onerror = function() {
                    reject(new Error('图片加载失败'));
                };
                img.src = imgUrl;
            });
        }

        async function downloadImage() {
            try {
                await downloadSingleImage(currentImageUrl, currentNormalizedName);
            } catch (error) {
                alert('下载失败: ' + error.message);
            }
        }

        async function downloadSelected() {
            const btn = document.getElementById('downloadSelectedBtn');
            const originalText = btn.textContent;
            const total = selectedCards.size;
            let completed = 0;
            
            btn.disabled = true;
            btn.textContent = `下载中...`;

            try {
                const sortedIndices = Array.from(selectedCards).sort((a, b) => a - b);
                
                for (const index of sortedIndices) {
                    const card = allCards[index];
                    const imgUrl = getImageUrl(card.imageUrl);
                    const normalizedName = extractNormalizedName(card.imageUrl);
                    
                    try {
                        await downloadSingleImage(imgUrl, normalizedName);
                        completed++;
                        btn.textContent = `下载中... (${completed}/${total})`;
                        
                        await new Promise(resolve => setTimeout(resolve, 300));
                    } catch (error) {
                        console.error(`下载失败: ${normalizedName}`, error);
                    }
                }
                
                btn.textContent = `下载完成 (${completed}/${total})`;
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = selectedCards.size === 0;
                }, 2000);
            } catch (error) {
                alert('批量下载失败: ' + error.message);
                btn.textContent = originalText;
                btn.disabled = selectedCards.size === 0;
            }
        }

        document.getElementById('modal').onclick = function(e) {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        };

        loadCards();
    </script>
</body>
</html>
