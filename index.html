<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kards Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .filter-label {
            font-size: 16px;
            color: #eee;
        }

        .filter-select {
            background: #16213e;
            color: #eee;
            border: 2px solid #333;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .filter-select:hover {
            border-color: #ffd700;
        }

        .filter-select:focus {
            outline: none;
            border-color: #ffd700;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            padding: 50px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
        }

        .download-btn {
            position: absolute;
            top: -50px;
            right: 0;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #ffed4a;
        }

        .close-btn {
            position: absolute;
            top: -50px;
            left: 0;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #c0392b;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            padding: 50px;
            font-size: 18px;
        }

        .progress {
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
            color: #aaa;
        }

        .top-nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 999;
            text-decoration: none;
            display: inline-block;
        }

        .top-nav-btn:hover {
            background: #ffed4a;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <a href="hq.html" class="top-nav-btn">总部</a>
    <div class="container">
        <h1>Kards 卡牌收藏</h1>
        <div class="filter-bar">
            <span class="filter-label">费用：</span>
            <select class="filter-select" id="cost-filter">
                <option value="all">全部</option>
                <option value="0">0费</option>
                <option value="1">1费</option>
                <option value="2">2费</option>
                <option value="3">3费</option>
                <option value="4">4费</option>
                <option value="5">5费</option>
                <option value="6">6费</option>
                <option value="7+">7+费</option>
            </select>
            <span class="filter-label">国家：</span>
            <select class="filter-select" id="faction-filter">
                <option value="all">全部</option>
                <option value="Germany">德国</option>
                <option value="USA">美国</option>
                <option value="Soviet">苏联</option>
                <option value="Britain">英国</option>
                <option value="Japan">日本</option>
                <option value="Italy">意大利</option>
                <option value="France">法国</option>
                <option value="Neutral">中立</option>
                <option value="Anzac">澳新</option>
                <option value="Finland">芬兰</option>
                <option value="Poland">波兰</option>
            </select>
        </div>
        <div id="loading" class="loading">加载中...</div>
        <div id="gallery" class="gallery"></div>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">关闭</button>
            <button class="download-btn" onclick="downloadImage()">下载</button>
            <img id="modalImg" src="" alt="放大图片">
        </div>
    </div>

    <script>
        let currentImageUrl = '';
        let currentNormalizedName = '';
        let currentCostFilter = 'all';
        let currentFactionFilter = 'all';
        let allCards = [];

        function extractNormalizedName(imageUrl) {
            const parts = imageUrl.split('/');
            const fileName = parts[parts.length - 1];
            return fileName.replace(/\.[^/.]+$/, '');
        }

        function getImageUrl(imageUrl) {
            return `https://images.weserv.nl/?url=ssl:www.kards.com${imageUrl}`;
        }

        function matchesFilter(card) {
            const costMatch = currentCostFilter === 'all' 
                ? true 
                : (currentCostFilter === '7+' ? card.kredits >= 7 : card.kredits === parseInt(currentCostFilter));
            
            const factionMatch = currentFactionFilter === 'all' 
                ? true 
                : card.faction === currentFactionFilter;
            
            return costMatch && factionMatch;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            allCards.forEach(card => {
                if (matchesFilter(card)) {
                    const imgUrl = getImageUrl(card.imageUrl);
                    const normalizedName = extractNormalizedName(card.imageUrl);

                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'card';
                    cardDiv.innerHTML = `<img src="${imgUrl}" alt="卡牌" loading="lazy">`;
                    cardDiv.onclick = () => openModal(imgUrl, normalizedName);
                    gallery.appendChild(cardDiv);
                }
            });
        }

        async function loadFilters() {
            try {
                const response = await fetch('filters.json');
                if (!response.ok) {
                    throw new Error('加载失败');
                }
                allCards = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderGallery();
            } catch (error) {
                document.getElementById('loading').textContent = '加载失败';
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            }
        }

        function openModal(imgUrl, normalizedName) {
            currentImageUrl = imgUrl;
            currentNormalizedName = normalizedName;
            document.getElementById('modalImg').src = imgUrl;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function downloadImage() {
            try {
                const response = await fetch(currentImageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentNormalizedName}.avif`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('下载失败: ' + error.message);
            }
        }

        document.getElementById('modal').onclick = function(e) {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        };

        document.getElementById('cost-filter').addEventListener('change', (e) => {
            currentCostFilter = e.target.value;
            renderGallery();
        });

        document.getElementById('faction-filter').addEventListener('change', (e) => {
            currentFactionFilter = e.target.value;
            renderGallery();
        });

        loadFilters();
    </script>
</body>
</html>
